<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#111d33"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#1a3a5c" stroke-width="2"/>
  <!-- AB monogram with lightning bolt -->
  <g transform="translate(100, 70)">
    <!-- Left leg of A -->
    <line x1="-35" y1="40" x2="-10" y2="-35" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Right leg of A -->
    <line x1="10" y1="-35" x2="35" y2="40" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- A crossbar -->
    <line x1="-20" y1="10" x2="20" y2="10" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Lightning bolt / line through -->
    <polyline points="-5,-35 5,-5 -5,5 10,40" fill="none" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="white">Agent</text>
  <text x="100" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="#3B82F6">Bill</text>
</svg>
